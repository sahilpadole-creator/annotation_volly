services:
  - type: web
    name: volleyball-annotator-inference
    runtime: docker
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: TOUCH_PYTHON
        sync: false
      - key: TOUCH_SCRIPT
        sync: false
      - key: TOUCH_CHECKPOINT
        sync: false
      - key: TOUCH_DEVICE
        value: cpu
      - key: TOUCH_STRIDE
        value: "8"
      - key: TOUCH_BATCH_SIZE
        value: "8"
      - key: SKILL_PYTHON
        sync: false
      - key: SKILL_SCRIPT
        sync: false
      - key: SKILL_CONFIG
        sync: false
      - key: SKILL_CHECKPOINT
        sync: false
      - key: SKILL_GT_XML
        sync: false
